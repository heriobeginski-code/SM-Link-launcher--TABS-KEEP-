<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs | High Vis Command</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Geist Mono', monospace;
            font-weight: 700; /* Global Bold */
            margin: 0;
            overflow-x: hidden;
        }

        /* High Luminosity Orange Glow */
        .glow-border {
            border: 2px solid rgba(255, 170, 0, 0.4);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.1);
            transition: all 0.2s ease-in-out;
        }

        .glow-border:hover {
            border-color: rgba(255, 170, 0, 1);
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.3);
            transform: scale(1.01);
        }

        .lit-text {
            color: #fff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
        }

        .search-glow:focus {
            border-color: #ffaa00 !important;
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.4);
            outline: none;
        }

        .btn-execute {
            background: #ffaa00;
            color: #000;
            padding: 14px 28px;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .btn-abort {
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 14px 28px;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 14px;
        }

        input {
            background: #0a0a0a !important;
            border: 2px solid #222 !important;
            color: #fff !important;
            padding: 18px !important;
            width: 100%;
            border-radius: 6px;
        }

        .modal-bg { background: rgba(0, 0, 0, 0.97); }
        
        /* Custom scrollbar for orientation */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #ffaa00; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('genie_tabs_v3');
                return saved ? JSON.parse(saved) : { folders: [], links: [] };
            });

            const [searchTerm, setSearchTerm] = useState('');
            const [modal, setModal] = useState({ open: false, type: 'link' });
            const [form, setForm] = useState({ name: '', url: '' });
            const [dragId, setDragId] = useState(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('genie_tabs_v3', JSON.stringify(data));
            }, [data]);

            const addItem = () => {
                if (!form.name) return;
                if (modal.type === 'folder') {
                    const newFolder = { id: 'f' + Date.now(), name: form.name, links: [] };
                    setData(prev => ({ ...prev, folders: [...prev.folders, newFolder] }));
                } else {
                    const cleanUrl = form.url.includes('://') ? form.url : `https://${form.url}`;
                    const newLink = { id: 'l' + Date.now(), name: form.name, url: cleanUrl };
                    setData(prev => ({ ...prev, links: [...prev.links, newLink] }));
                }
                setModal({ open: false });
                setForm({ name: '', url: '' });
            };

            const downloadBackup = () => {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `tabs_sync_${new Date().toLocaleDateString()}.json`;
                a.click();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (imported.folders && imported.links) {
                            setData(imported);
                            alert("SYNC COMPLETE: System Repopulated.");
                        }
                    } catch (err) { alert("DATA CORRUPTION: Invalid JSON file."); }
                };
                reader.readAsText(file);
            };

            // Search Filter Logic
            const filterItems = (items) => items.filter(item => 
                item.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="min-h-screen p-8 md:p-16 max-w-6xl mx-auto">
                    {/* Header Area */}
                    <header className="text-center mb-12">
                        <h1 className="text-7xl font-bold tracking-[0.3em] uppercase italic text-white mb-6">Tabs</h1>
                        
                        {/* Live Search Bar */}
                        <div className="max-w-xl mx-auto mb-10">
                            <input 
                                placeholder="SEARCH DATA NODES..." 
                                className="search-glow text-center uppercase tracking-widest text-sm"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>

                        <div className="flex flex-wrap justify-center gap-8">
                            <button onClick={() => setModal({ open: true, type: 'folder' })} className="text-xs uppercase tracking-widest text-orange-400 hover:text-orange-200">New Folder</button>
                            <button onClick={() => setModal({ open: true, type: 'link' })} className="text-xs uppercase tracking-widest text-orange-400 hover:text-orange-200">Add Link Card</button>
                            <button onClick={downloadBackup} className="text-xs uppercase tracking-widest text-gray-500 hover:text-white">Download JSON</button>
                            <button onClick={() => fileInputRef.current.click()} className="text-xs uppercase tracking-widest text-gray-500 hover:text-white">Upload JSON</button>
                        </div>
                        <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={handleFileUpload} />
                    </header>

                    {/* Folders Section */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 mb-16">
                        {data.folders.map(folder => {
                            const filteredLinks = filterItems(folder.links);
                            if (searchTerm && filteredLinks.length === 0 && !folder.name.toLowerCase().includes(searchTerm.toLowerCase())) return null;
                            
                            return (
                                <div key={folder.id} onDragOver={e => e.preventDefault()} onDrop={() => {
                                    if (!dragId || dragId.startsWith('f')) return;
                                    setData(prev => ({
                                        links: prev.links.filter(l => l.id !== dragId),
                                        folders: prev.folders.map(f => f.id === folder.id ? { ...f, links: [...f.links, prev.links.find(l => l.id === dragId)] } : f)
                                    }));
                                    setDragId(null);
                                }} className="glow-border p-10 rounded-xl bg-[#030303] min-h-[200px]">
                                    <div className="flex justify-between items-center mb-8 border-b-2 border-orange-500/20 pb-4">
                                        <span className="text-sm font-bold uppercase tracking-[0.4em] text-orange-500">{folder.name}</span>
                                        <button onClick={() => setData(prev => ({...prev, folders: prev.folders.filter(f => f.id !== folder.id)}))} className="text-orange-900 hover:text-red-500 text-[10px] tracking-tighter">DELETE_DIR</button>
                                    </div>
                                    <div className="flex flex-wrap gap-4">
                                        {filteredLinks.map(link => (
                                            <div key={link.id} onClick={() => window.open(link.url, '_blank')} className="px-6 py-4 border-2 border-orange-500/30 text-md hover:bg-orange-500 hover:text-black cursor-pointer rounded-lg transition-all lit-text uppercase">
                                                {link.name}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Loose Links Section */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        {filterItems(data.links).map(link => (
                            <div key={link.id} draggable onDragStart={() => setDragId(link.id)} className="glow-border p-10 rounded-xl bg-[#030303] cursor-grab active:cursor-grabbing group">
                                <div className="flex justify-between items-start mb-6">
                                    <span className="text-[10px] text-orange-500/40 uppercase tracking-widest">Active_Node</span>
                                    <button onClick={() => setData(prev => ({...prev, links: prev.links.filter(l => l.id !== link.id)}))} className="opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 text-xl">×</button>
                                </div>
                                <h3 onClick={() => window.open(link.url, '_blank')} className="text-xl lit-text truncate cursor-pointer uppercase">
                                    {link.name}
                                </h3>
                                <p className="text-[10px] text-gray-700 truncate mt-4 opacity-50 uppercase tracking-tighter">{link.url}</p>
                            </div>
                        ))}
                    </div>

                    {/* Config Modal */}
                    {modal.open && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 modal-bg">
                            <div className="glow-border w-full max-w-lg p-14 bg-black rounded-2xl">
                                <h2 className="text-md font-bold uppercase tracking-[0.5em] mb-12 border-b-2 border-orange-500/20 pb-4 text-orange-500 text-center">Config_{modal.type}</h2>
                                <div className="space-y-10">
                                    <div>
                                        <label className="text-xs uppercase text-orange-500/50 mb-4 block tracking-[0.2em]">Name</label>
                                        <input autoFocus value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="uppercase" />
                                    </div>
                                    {modal.type === 'link' && (
                                        <div>
                                            <label className="text-xs uppercase text-orange-500/50 mb-4 block tracking-[0.2em]">URL</label>
                                            <input value={form.url} onChange={e => setForm({...form, url: e.target.value})} />
                                        </div>
                                    )}
                                    <div className="flex gap-6 pt-8">
                                        <button onClick={() => setModal({open: false})} className="btn-abort flex-1 font-bold">Abort</button>
                                        <button onClick={addItem} className="btn-execute flex-1 font-bold">Execute</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
