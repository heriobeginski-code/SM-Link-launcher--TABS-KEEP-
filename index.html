<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs | Command Deck</title>
    
    <!-- App Icon & PWA Metadata -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Manifest for Taskbar/Dock Branding (fixed JSON data URL) -->
    <link
        rel="manifest"
        href='data:application/manifest+json,{"name":"Tabs","short_name":"Tabs","icons":[{"src":"icon.png","sizes":"192x192","type":"image/png"}],"start_url":".","display":"standalone","background_color":"#000000","theme_color":"#000000"}'
    >

    <!-- React + Babel + Tailwind (same pattern, just using Babel correctly) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Geist Mono', monospace;
            font-weight: 700;
            margin: 0;
            overflow-x: hidden;
        }

        .glow-border {
            border: 2px solid rgba(255, 170, 0, 0.4);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.1);
            transition: all 0.2s ease-in-out;
        }

        .glow-border:hover {
            border-color: rgba(255, 170, 0, 1);
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.3);
            transform: scale(1.01);
        }

        .lit-text {
            color: #fff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
        }

        .search-glow:focus {
            border-color: #ffaa00 !important;
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.4);
            outline: none;
        }

        input {
            background: #0a0a0a !important;
            border: 2px solid #222 !important;
            color: #fff !important;
            padding: 18px !important;
            width: 100%;
            border-radius: 6px;
        }

        .btn-execute { background: #ffaa00; color: #000; padding: 14px 28px; border-radius: 4px; text-transform: uppercase; }
        .btn-abort { border: 2px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 14px 28px; border-radius: 4px; text-transform: uppercase; }
        .modal-bg { background: rgba(0, 0, 0, 0.97); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ffaa00; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Note data-presets="react" so Babel transpiles JSX -->
    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [data, setData] = useState(() => {
                try {
                    const saved = localStorage.getItem('genie_tabs_v3');
                    if (!saved) return { folders: [], links: [] };
                    const parsed = JSON.parse(saved);
                    return {
                        folders: Array.isArray(parsed?.folders) ? parsed.folders : [],
                        links: Array.isArray(parsed?.links) ? parsed.links : [],
                    };
                } catch {
                    return { folders: [], links: [] };
                }
            });

            const [searchTerm, setSearchTerm] = useState('');
            const [modal, setModal] = useState({ open: false, type: 'link' });
            const [form, setForm] = useState({ name: '', url: '' });
            const [dragId, setDragId] = useState(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                try {
                    localStorage.setItem('genie_tabs_v3', JSON.stringify(data));
                } catch {
                    // ignore storage errors
                }
            }, [data]);

            const closeModal = () => {
                setModal(prev => ({ ...prev, open: false }));
                setForm({ name: '', url: '' });
            };

            const addItem = () => {
                const trimmedName = form.name.trim();
                const trimmedUrl = form.url.trim();
                if (!trimmedName) return;

                if (modal.type === 'folder') {
                    const newFolder = { id: 'f' + Date.now(), name: trimmedName, links: [] };
                    setData(prev => ({ ...prev, folders: [...prev.folders, newFolder] }));
                } else {
                    if (!trimmedUrl) return;
                    const cleanUrl = trimmedUrl.includes('://') ? trimmedUrl : `https://${trimmedUrl}`;
                    const newLink = { id: 'l' + Date.now(), name: trimmedName, url: cleanUrl };
                    setData(prev => ({ ...prev, links: [...prev.links, newLink] }));
                }

                closeModal();
            };

            const downloadBackup = () => {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'tabs_sync.json';
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported?.folders) && Array.isArray(imported?.links)) {
                            setData(imported);
                            alert("SYNC COMPLETE");
                        } else {
                            alert("ERROR: Invalid Data");
                        }
                    } catch {
                        alert("ERROR: Invalid Data");
                    }
                    e.target.value = '';
                };
                reader.readAsText(file);
            };

            const filterItems = (items) => items.filter(item =>
                item.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="min-h-screen p-8 md:p-16 max-w-6xl mx-auto">
                    <header className="text-center mb-12">
                        <h1 className="text-7xl font-bold tracking-[0.3em] uppercase italic text-white mb-6">Tabs</h1>
                        <div className="max-w-xl mx-auto mb-10">
                            <input 
                                placeholder="SEARCH DATA NODES..." 
                                className="search-glow text-center uppercase tracking-widest text-sm"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                        <div className="flex flex-wrap justify-center gap-8">
                            <button
                                onClick={() => setModal({ open: true, type: 'folder' })}
                                className="text-xs uppercase tracking-widest text-orange-400 hover:text-orange-200"
                            >
                                New Folder
                            </button>
                            <button
                                onClick={() => setModal({ open: true, type: 'link' })}
                                className="text-xs uppercase tracking-widest text-orange-400 hover:text-orange-200"
                            >
                                Add Link Card
                            </button>
                            <button
                                onClick={downloadBackup}
                                className="text-xs uppercase tracking-widest text-gray-500 hover:text-white"
                            >
                                Download JSON
                            </button>
                            <button
                                onClick={() => fileInputRef.current && fileInputRef.current.click()}
                                className="text-xs uppercase tracking-widest text-gray-500 hover:text-white"
                            >
                                Upload JSON
                            </button>
                        </div>
                        <input
                            type="file"
                            ref={fileInputRef}
                            className="hidden"
                            accept=".json,application/json"
                            onChange={handleFileUpload}
                        />
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 mb-16">
                        {data.folders.map(folder => {
                            const filteredLinks = filterItems(folder.links || []);
                            if (
                                searchTerm &&
                                filteredLinks.length === 0 &&
                                !folder.name.toLowerCase().includes(searchTerm.toLowerCase())
                            ) return null;
                            return (
                                <div
                                    key={folder.id}
                                    onDragOver={e => e.preventDefault()}
                                    onDrop={() => {
                                        if (!dragId || dragId.startsWith('f')) return;
                                        setData(prev => {
                                            const draggedLink = prev.links.find(l => l.id === dragId);
                                            if (!draggedLink) return prev;
                                            return {
                                                links: prev.links.filter(l => l.id !== dragId),
                                                folders: prev.folders.map(f =>
                                                    f.id === folder.id
                                                        ? { ...f, links: [...(f.links || []), draggedLink] }
                                                        : f
                                                ),
                                            };
                                        });
                                        setDragId(null);
                                    }}
                                    className="glow-border p-10 rounded-xl bg-[#030303] min-h-[200px]"
                                >
                                    <div className="flex justify-between items-center mb-8 border-b-2 border-orange-500/20 pb-4">
                                        <span className="text-sm font-bold uppercase tracking-[0.4em] text-orange-500">
                                            {folder.name}
                                        </span>
                                        <button
                                            onClick={() => setData(prev => ({
                                                ...prev,
                                                folders: prev.folders.filter(f => f.id !== folder.id),
                                            }))}
                                            className="text-orange-900 text-[10px]"
                                        >
                                            DELETE
                                        </button>
                                    </div>
                                    <div className="flex flex-wrap gap-4">
                                        {filteredLinks.map(link => (
                                            <div
                                                key={link.id}
                                                onClick={() => window.open(link.url, '_blank', 'noopener,noreferrer')}
                                                className="px-6 py-4 border-2 border-orange-500/30 text-md hover:bg-orange-500 hover:text-black cursor-pointer rounded-lg lit-text uppercase transition-all"
                                            >
                                                {link.name}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        {filterItems(data.links).map(link => (
                            <div
                                key={link.id}
                                draggable
                                onDragStart={() => setDragId(link.id)}
                                className="glow-border p-10 rounded-xl bg-[#030303] cursor-grab group"
                            >
                                <div className="flex justify-between items-start mb-6">
                                    <span className="text-[10px] text-orange-500/40 uppercase tracking-widest">Node</span>
                                    <button
                                        onClick={() => setData(prev => ({
                                            ...prev,
                                            links: prev.links.filter(l => l.id !== link.id),
                                        }))}
                                        className="opacity-0 group-hover:opacity-100 text-red-900"
                                    >
                                        ×
                                    </button>
                                </div>
                                <h3
                                    onClick={() => window.open(link.url, '_blank', 'noopener,noreferrer')}
                                    className="text-xl lit-text truncate cursor-pointer uppercase"
                                >
                                    {link.name}
                                </h3>
                            </div>
                        ))}
                    </div>

                    {modal.open && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 modal-bg">
                            <div className="glow-border w-full max-w-lg p-14 bg-black rounded-2xl">
                                <h2 className="text-md font-bold uppercase tracking-[0.5em] mb-12 border-b-2 border-orange-500/20 pb-4 text-orange-500 text-center">
                                    Config_{modal.type}
                                </h2>
                                <div className="space-y-10">
                                    <div>
                                        <label className="text-xs uppercase text-orange-500/50 mb-4 block">Name</label>
                                        <input
                                            autoFocus
                                            value={form.name}
                                            onChange={e => setForm({ ...form, name: e.target.value })}
                                            className="uppercase"
                                        />
                                    </div>
                                    {modal.type === 'link' && (
                                        <div>
                                            <label className="text-xs uppercase text-orange-500/50 mb-4 block">URL</label>
                                            <input
                                                value={form.url}
                                                onChange={e => setForm({ ...form, url: e.target.value })}
                                            />
                                        </div>
                                    )}
                                    <div className="flex gap-6 pt-8">
                                        <button
                                            onClick={closeModal}
                                            className="btn-abort flex-1 font-bold"
                                        >
                                            Abort
                                        </button>
                                        <button
                                            onClick={addItem}
                                            className="btn-execute flex-1 font-bold"
                                        >
                                            Execute
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
