<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENIE | Warm Command Deck</title>
    
    <!-- Lightweight Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Geist Mono', monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* Warm Orange Holographic Glow UI */
        .glow-border {
            border: 1px solid rgba(255, 152, 0, 0.2);
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.05);
            transition: border 0.3s, box-shadow 0.3s, transform 0.2s;
        }

        .glow-border:hover {
            border-color: rgba(255, 152, 0, 0.8);
            box-shadow: 0 0 25px rgba(255, 152, 0, 0.2);
            transform: translateY(-2px);
        }

        /* "Lit" text effect for Link Names */
        .lit-text {
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
            font-weight: 600;
        }

        .btn-primary {
            background: #ff9800;
            color: #000;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 6px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1.5px;
            box-shadow: 0 0 10px rgba(255, 152, 0, 0.3);
        }

        .btn-secondary {
            border: 1px solid #ff9800;
            color: #ff9800;
            padding: 12px 24px;
            border-radius: 6px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1.5px;
        }

        /* Improved spacing for high-density cards */
        .card-large {
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        input {
            background: #111 !important;
            border: 1px solid #ff980044 !important;
            color: #fff !important;
            font-size: 16px !important; /* Prevents zoom on mobile */
        }
        
        .modal-bg {
            background: rgba(0, 0, 0, 0.95);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #ff980044; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('genie_warm_vault');
                return saved ? JSON.parse(saved) : { folders: [], links: [] };
            });

            const [modal, setModal] = useState({ open: false, type: 'link' });
            const [form, setForm] = useState({ name: '', url: '' });
            const [dragId, setDragId] = useState(null);

            useEffect(() => {
                localStorage.setItem('genie_warm_vault', JSON.stringify(data));
            }, [data]);

            const addItem = () => {
                if (!form.name) return;
                if (modal.type === 'folder') {
                    const newFolder = { id: 'f' + Date.now(), name: form.name, links: [] };
                    setData(prev => ({ ...prev, folders: [...prev.folders, newFolder] }));
                } else {
                    const cleanUrl = form.url.includes('://') ? form.url : `https://${form.url}`;
                    const newLink = { id: 'l' + Date.now(), name: form.name, url: cleanUrl };
                    setData(prev => ({ ...prev, links: [...prev.links, newLink] }));
                }
                closeModal();
            };

            const deleteItem = (id, type, folderId = null) => {
                if (type === 'folder') {
                    setData(prev => ({ ...prev, folders: prev.folders.filter(f => f.id !== id) }));
                } else if (folderId) {
                    setData(prev => ({
                        ...prev,
                        folders: prev.folders.map(f => f.id === folderId ? { ...f, links: f.links.filter(l => l.id !== id) } : f)
                    }));
                } else {
                    setData(prev => ({ ...prev, links: prev.links.filter(l => l.id !== id) }));
                }
            };

            const closeModal = () => {
                setModal({ open: false });
                setForm({ name: '', url: '' });
            };

            const onDrop = (targetFolderId) => {
                if (!dragId || dragId.startsWith('f')) return;
                setData(prev => {
                    const linkObj = prev.links.find(l => l.id === dragId);
                    if (!linkObj) return prev;
                    return {
                        links: prev.links.filter(l => l.id !== dragId),
                        folders: prev.folders.map(f => f.id === targetFolderId ? { ...f, links: [...f.links, linkObj] } : f)
                    };
                });
                setDragId(null);
            };

            return (
                <div className="min-h-screen p-8 md:p-16 max-w-6xl mx-auto">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 border-b border-orange-500/20 pb-10">
                        <div>
                            <h1 className="text-3xl font-bold tracking-tighter uppercase italic">
                                <span className="text-orange-500">GENIE</span> COMMAND
                            </h1>
                            <p className="text-[10px] text-orange-500/60 tracking-[0.5em] uppercase mt-2">Eye-Safe / Low-Resource / V2.5</p>
                        </div>
                        <div className="flex gap-4 mt-6 md:mt-0">
                            <button onClick={() => setModal({ open: true, type: 'folder' })} className="btn-secondary">New Folder</button>
                            <button onClick={() => setModal({ open: true, type: 'link' })} className="btn-primary">Add Link Card</button>
                        </div>
                    </header>

                    {/* Folders Section - Larger Format */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-16">
                        {data.folders.map(folder => (
                            <div 
                                key={folder.id}
                                onDragOver={e => e.preventDefault()}
                                onDrop={() => onDrop(folder.id)}
                                className="glow-border p-8 rounded-xl bg-[#050505] min-h-[220px]"
                            >
                                <div className="flex justify-between items-center mb-6 border-b border-orange-500/10 pb-4">
                                    <span className="text-xs font-bold uppercase tracking-[0.3em] text-orange-500/80">{folder.name}</span>
                                    <button onClick={() => deleteItem(folder.id, 'folder')} className="text-orange-900 hover:text-orange-500 text-[10px] tracking-widest">REMOVE_DIR</button>
                                </div>
                                <div className="flex flex-wrap gap-4">
                                    {folder.links.map(link => (
                                        <div 
                                            key={link.id}
                                            onClick={() => window.open(link.url, '_blank')}
                                            className="px-5 py-3 border border-orange-500/20 text-sm hover:bg-orange-500 hover:text-black cursor-pointer rounded-lg transition-all lit-text"
                                        >
                                            {link.name}
                                            <span onClick={(e) => { e.stopPropagation(); deleteItem(link.id, 'link', folder.id); }} className="ml-3 opacity-40 hover:opacity-100 text-lg">×</span>
                                        </div>
                                    ))}
                                    {folder.links.length === 0 && <span className="text-[10px] text-gray-800 uppercase tracking-widest">Waiting for nodes...</span>}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Loose Links Section - Larger Cards */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        {data.links.map(link => (
                            <div 
                                key={link.id}
                                draggable
                                onDragStart={() => setDragId(link.id)}
                                className="glow-border p-8 rounded-xl bg-[#050505] cursor-grab active:cursor-grabbing group card-large"
                            >
                                <div className="flex justify-between items-start">
                                    <span className="text-[9px] text-orange-500/40 uppercase tracking-widest">Active_Node</span>
                                    <button onClick={() => deleteItem(link.id, 'link')} className="opacity-0 group-hover:opacity-100 text-orange-900 hover:text-orange-500 text-xl leading-none transition-opacity">×</button>
                                </div>
                                <h3 
                                    onClick={() => window.open(link.url, '_blank')}
                                    className="text-lg lit-text truncate cursor-pointer mt-4"
                                >
                                    {link.name}
                                </h3>
                                <p className="text-[9px] text-gray-600 truncate mt-2 opacity-50 uppercase">{link.url.replace('https://', '')}</p>
                            </div>
                        ))}
                    </div>

                    {/* Config Modal */}
                    {modal.open && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 modal-bg">
                            <div className="glow-border w-full max-w-md p-10 bg-black rounded-2xl">
                                <h2 className="text-sm font-bold uppercase tracking-[0.4em] mb-10 border-b border-orange-500/20 pb-4 text-orange-500">
                                    Config_{modal.type}
                                </h2>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] uppercase text-orange-500/50 mb-2 block">Display Identity</label>
                                        <input 
                                            autoFocus
                                            className="w-full p-4 rounded outline-none"
                                            value={form.name}
                                            onChange={e => setForm({...form, name: e.target.value})}
                                        />
                                    </div>
                                    {modal.type === 'link' && (
                                        <div>
                                            <label className="text-[10px] uppercase text-orange-500/50 mb-2 block">Network Path (URL)</label>
                                            <input 
                                                className="w-full p-4 rounded outline-none"
                                                value={form.url}
                                                onChange={e => setForm({...form, url: e.target.value})}
                                            />
                                        </div>
                                    )}
                                    <div className="flex gap-4 pt-6">
                                        <button onClick={closeModal} className="flex-1 py-4 text-[10px] uppercase border border-orange-500/20 hover:bg-orange-500/5 tracking-widest">Abort</button>
                                        <button onClick={addItem} className="flex-1 py-4 text-[10px] uppercase bg-orange-500 text-black font-bold tracking-widest">Execute</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
