<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENIE | Link Launcher</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Geist Mono', monospace; color: white; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #root { position: relative; z-index: 10; height: 100vh; overflow-y: auto; background: rgba(0,0,0,0.4); scrollbar-width: none; }
        #root::-webkit-scrollbar { display: none; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            border-color: rgba(255, 87, 34, 0.5);
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(255, 87, 34, 0.2);
        }

        .folder-drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.1);
        }

        .folder-drop-zone.active {
            border-color: #ff5722;
            background: rgba(255, 87, 34, 0.1);
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-pop { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="root"></div>

    <!-- Background Shader Script -->
    <script>
        const vertexShader = `
            uniform float time;
            varying vec2 vUv;
            void main() {
                vUv = uv;
                vec3 pos = position;
                pos.z += sin(pos.x * 3.0 + time) * 0.2;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float time;
            uniform vec3 color1;
            uniform vec3 color2;
            varying vec2 vUv;
            void main() {
                vec2 uv = vUv;
                float noise = sin(uv.x * 10.0 + time) * cos(uv.y * 10.0 + time);
                vec3 color = mix(color1, color2, noise * 0.5 + 0.5);
                gl_FragColor = vec4(color, 0.4);
            }
        `;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.PlaneGeometry(20, 20, 100, 100);
        const uniforms = {
            time: { value: 0 },
            color1: { value: new THREE.Color("#1a1a1a") },
            color2: { value: new THREE.Color("#ff5722") }
        };
        const material = new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader, transparent: true, wireframe: true });
        const plane = new THREE.Mesh(geometry, material);
        plane.rotation.x = -Math.PI / 3;
        scene.add(plane);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            uniforms.time.value += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <!-- App Script -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('genie_launcher_v1');
                return saved ? JSON.parse(saved) : { folders: [], links: [] };
            });
            
            const [modal, setModal] = useState({ open: false, type: 'link', targetFolderId: null });
            const [draggedItem, setDraggedItem] = useState(null);
            const [form, setForm] = useState({ name: '', url: '' });

            useEffect(() => {
                localStorage.setItem('genie_launcher_v1', JSON.stringify(data));
            }, [data]);

            const addLink = () => {
                const newLink = { id: Date.now(), name: form.name, url: form.url.startsWith('http') ? form.url : `https://${form.url}` };
                if (modal.targetFolderId) {
                    setData(prev => ({
                        ...prev,
                        folders: prev.folders.map(f => f.id === modal.targetFolderId ? { ...f, links: [...f.links, newLink] } : f)
                    }));
                } else {
                    setData(prev => ({ ...prev, links: [...prev.links, newLink] }));
                }
                closeModal();
            };

            const addFolder = () => {
                const newFolder = { id: Date.now(), name: form.name, links: [] };
                setData(prev => ({ ...prev, folders: [...prev.folders, newFolder] }));
                closeModal();
            };

            const deleteItem = (id, type, folderId = null) => {
                if (type === 'folder') {
                    setData(prev => ({ ...prev, folders: prev.folders.filter(f => f.id !== id) }));
                } else if (folderId) {
                    setData(prev => ({
                        ...prev,
                        folders: prev.folders.map(f => f.id === folderId ? { ...f, links: f.links.filter(l => l.id !== id) } : f)
                    }));
                } else {
                    setData(prev => ({ ...prev, links: prev.links.filter(l => l.id !== id) }));
                }
            };

            const closeModal = () => {
                setModal({ open: false, type: 'link', targetFolderId: null });
                setForm({ name: '', url: '' });
            };

            // DnD Handlers
            const onDragStart = (e, item, sourceFolderId = null) => {
                setDraggedItem({ item, sourceFolderId });
                e.dataTransfer.setData("text/plain", item.id);
            };

            const onDropOnFolder = (e, targetFolderId) => {
                e.preventDefault();
                if (!draggedItem || draggedItem.item.links) return; // Can't drop folders into folders here

                setData(prev => {
                    // Remove from source
                    let newLinks = [...prev.links];
                    let newFolders = prev.folders.map(f => {
                        if (f.id === draggedItem.sourceFolderId) {
                            return { ...f, links: f.links.filter(l => l.id !== draggedItem.item.id) };
                        }
                        return f;
                    });

                    if (!draggedItem.sourceFolderId) {
                        newLinks = newLinks.filter(l => l.id !== draggedItem.item.id);
                    }

                    // Add to target
                    newFolders = newFolders.map(f => {
                        if (f.id === targetFolderId) {
                            return { ...f, links: [...f.links, draggedItem.item] };
                        }
                        return f;
                    });

                    return { links: newLinks, folders: newFolders };
                });
                setDraggedItem(null);
            };

            return (
                <div className="max-w-6xl mx-auto px-8 py-12">
                    <header className="flex justify-between items-end mb-16 border-b border-white/10 pb-8">
                        <div>
                            <h1 className="text-3xl font-bold tracking-tighter uppercase italic flex items-center gap-2">
                                <i data-lucide="zap" className="text-[#ff5722] fill-[#ff5722]"></i>
                                GENIE <span className="text-[#ff5722]">LAUNCHER</span>
                            </h1>
                            <p className="text-[10px] text-gray-500 tracking-[0.5em] mt-2 uppercase">Custom Command Deck // v3.0</p>
                        </div>
                        <div className="flex gap-4">
                            <button 
                                onClick={() => setModal({ open: true, type: 'folder' })}
                                className="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-[10px] tracking-widest uppercase hover:bg-white/10 transition"
                            >
                                + New Folder
                            </button>
                            <button 
                                onClick={() => setModal({ open: true, type: 'link' })}
                                className="px-4 py-2 bg-[#ff5722] rounded-lg text-[10px] font-bold tracking-widest uppercase hover:opacity-80 transition"
                            >
                                + Add Card
                            </button>
                        </div>
                    </header>

                    {/* Folders Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                        {data.folders.map(folder => (
                            <div 
                                key={folder.id}
                                className={`glass-card p-6 rounded-3xl min-h-[200px] ${draggedItem ? 'folder-drop-zone' : ''}`}
                                onDragOver={(e) => e.preventDefault()}
                                onDrop={(e) => onDropOnFolder(e, folder.id)}
                            >
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full bg-[#ff5722] animate-pulse"></div>
                                        <h2 className="text-xs font-bold tracking-widest uppercase text-gray-300">{folder.name}</h2>
                                    </div>
                                    <button onClick={() => deleteItem(folder.id, 'folder')} className="text-gray-600 hover:text-red-500 transition">
                                        <i data-lucide="x" className="w-4 h-4"></i>
                                    </button>
                                </div>
                                <div className="flex flex-wrap gap-3">
                                    {folder.links.map(link => (
                                        <LinkCard 
                                            key={link.id} 
                                            link={link} 
                                            onDelete={() => deleteItem(link.id, 'link', folder.id)}
                                            onDragStart={(e) => onDragStart(e, link, folder.id)}
                                            isSmall
                                        />
                                    ))}
                                    {folder.links.length === 0 && (
                                        <p className="text-[9px] text-gray-700 italic">Drag cards here to organize</p>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Loose Links Grid */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                        {data.links.map(link => (
                            <LinkCard 
                                key={link.id} 
                                link={link} 
                                onDelete={() => deleteItem(link.id, 'link')}
                                onDragStart={(e) => onDragStart(e, link)}
                            />
                        ))}
                    </div>

                    {/* Config Modal */}
                    {modal.open && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay">
                            <div className="glass-card w-full max-w-md p-8 rounded-3xl animate-pop border-white/20">
                                <h2 className="text-xl font-bold mb-6 tracking-tighter uppercase italic">
                                    Config <span className="text-[#ff5722]">{modal.type}</span>
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[9px] text-gray-500 tracking-widest uppercase block mb-2">Display Name</label>
                                        <input 
                                            autoFocus
                                            className="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-[#ff5722] outline-none transition"
                                            value={form.name}
                                            onChange={e => setForm({...form, name: e.target.value})}
                                            placeholder="e.g. GitHub Dashboard"
                                        />
                                    </div>
                                    {modal.type === 'link' && (
                                        <div>
                                            <label className="text-[9px] text-gray-500 tracking-widest uppercase block mb-2">Target URL</label>
                                            <input 
                                                className="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-[#ff5722] outline-none transition"
                                                value={form.url}
                                                onChange={e => setForm({...form, url: e.target.value})}
                                                placeholder="google.com"
                                            />
                                        </div>
                                    )}
                                    <div className="flex gap-3 mt-8">
                                        <button onClick={closeModal} className="flex-1 py-3 text-[10px] tracking-widest uppercase hover:text-white transition">Cancel</button>
                                        <button 
                                            onClick={modal.type === 'link' ? addLink : addFolder}
                                            className="flex-1 py-3 bg-[#ff5722] rounded-xl text-[10px] font-bold tracking-widest uppercase"
                                        >
                                            Confirm
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LinkCard = ({ link, onDelete, onDragStart, isSmall }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            
            return (
                <div 
                    draggable
                    onDragStart={onDragStart}
                    className={`glass-card group relative ${isSmall ? 'px-4 py-2' : 'p-6'} rounded-2xl cursor-grab active:cursor-grabbing`}
                >
                    <div className="flex justify-between items-start">
                        <div 
                            className="flex-1 cursor-pointer"
                            onClick={() => window.open(link.url, '_blank')}
                        >
                            <p className="text-[8px] text-[#ff5722] font-bold tracking-widest uppercase mb-1">
                                {new URL(link.url).hostname.replace('www.', '').split('.')[0]}
                            </p>
                            <h3 className={`${isSmall ? 'text-xs' : 'text-sm'} font-medium truncate pr-6 group-hover:text-[#ff5722] transition`}>
                                {link.name}
                            </h3>
                        </div>
                        <button 
                            onClick={(e) => { e.stopPropagation(); onDelete(); }}
                            className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-500 transition"
                        >
                            <i data-lucide="trash-2" className="w-3 h-3"></i>
                        </button>
                    </div>
                    {!isSmall && (
                        <div className="mt-4 pt-4 border-t border-white/5">
                             <p className="text-[8px] text-gray-600 italic font-mono uppercase tracking-tighter">
                                // Node: Ready for launch
                             </p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initial icon load
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
