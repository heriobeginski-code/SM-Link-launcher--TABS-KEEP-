<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENIE | Command Deck Lite</title>
    
    <!-- Ultra-Lightweight Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Geist Mono', monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* Subtle White Glow UI */
        .glow-border {
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
            transition: border 0.2s, box-shadow 0.2s;
        }

        .glow-border:hover {
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: #fff;
            color: #000;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .btn-secondary {
            border: 1px solid #fff;
            color: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .folder-active {
            border-color: #fff !important;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Scrollbar performance */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }

        input {
            background: #111 !important;
            border: 1px solid #333 !important;
            color: #fff !important;
        }
        
        /* Modal Backdrop */
        .modal-bg {
            background: rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('genie_lite_vault');
                return saved ? JSON.parse(saved) : { folders: [], links: [] };
            });

            const [modal, setModal] = useState({ open: false, type: 'link' });
            const [form, setForm] = useState({ name: '', url: '' });
            const [dragId, setDragId] = useState(null);

            useEffect(() => {
                localStorage.setItem('genie_lite_vault', JSON.stringify(data));
            }, [data]);

            const addItem = () => {
                if (!form.name) return;
                if (modal.type === 'folder') {
                    const newFolder = { id: 'f' + Date.now(), name: form.name, links: [] };
                    setData(prev => ({ ...prev, folders: [...prev.folders, newFolder] }));
                } else {
                    const cleanUrl = form.url.includes('://') ? form.url : `https://${form.url}`;
                    const newLink = { id: 'l' + Date.now(), name: form.name, url: cleanUrl };
                    setData(prev => ({ ...prev, links: [...prev.links, newLink] }));
                }
                closeModal();
            };

            const deleteItem = (id, type, folderId = null) => {
                if (type === 'folder') {
                    setData(prev => ({ ...prev, folders: prev.folders.filter(f => f.id !== id) }));
                } else if (folderId) {
                    setData(prev => ({
                        ...prev,
                        folders: prev.folders.map(f => f.id === folderId ? { ...f, links: f.links.filter(l => l.id !== id) } : f)
                    }));
                } else {
                    setData(prev => ({ ...prev, links: prev.links.filter(l => l.id !== id) }));
                }
            };

            const closeModal = () => {
                setModal({ open: false });
                setForm({ name: '', url: '' });
            };

            // Lightweight DnD
            const onDrop = (targetFolderId) => {
                if (!dragId || dragId.startsWith('f')) return;
                setData(prev => {
                    const linkObj = prev.links.find(l => l.id === dragId);
                    if (!linkObj) return prev;
                    return {
                        links: prev.links.filter(l => l.id !== dragId),
                        folders: prev.folders.map(f => f.id === targetFolderId ? { ...f, links: [...f.links, linkObj] } : f)
                    };
                });
                setDragId(null);
            };

            return (
                <div className="min-h-screen p-6 md:p-12 max-w-5xl mx-auto">
                    <header className="flex justify-between items-center mb-12 border-b border-white/10 pb-6">
                        <div>
                            <h1 className="text-xl font-bold tracking-widest uppercase">Command <span className="opacity-50">Deck</span></h1>
                            <p className="text-[9px] text-gray-500 tracking-[0.4em] uppercase mt-1">Status: Optimized // Performance: High</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setModal({ open: true, type: 'folder' })} className="btn-secondary">Folder+</button>
                            <button onClick={() => setModal({ open: true, type: 'link' })} className="btn-primary">Card+</button>
                        </div>
                    </header>

                    {/* Folders Section */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                        {data.folders.map(folder => (
                            <div 
                                key={folder.id}
                                onDragOver={e => e.preventDefault()}
                                onDrop={() => onDrop(folder.id)}
                                className="glow-border p-5 rounded bg-[#080808]"
                            >
                                <div className="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-gray-400">{folder.name}</span>
                                    <button onClick={() => deleteItem(folder.id, 'folder')} className="text-gray-600 hover:text-white text-xs">DEL</button>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {folder.links.map(link => (
                                        <div 
                                            key={link.id}
                                            onClick={() => window.open(link.url, '_blank')}
                                            className="px-3 py-1 border border-white/10 text-[11px] hover:bg-white hover:text-black cursor-pointer rounded transition-colors"
                                        >
                                            {link.name}
                                            <span onClick={(e) => { e.stopPropagation(); deleteItem(link.id, 'link', folder.id); }} className="ml-2 opacity-30 hover:opacity-100">×</span>
                                        </div>
                                    ))}
                                    {folder.links.length === 0 && <span className="text-[10px] text-gray-700 italic">Empty Slot</span>}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Loose Links Section */}
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                        {data.links.map(link => (
                            <div 
                                key={link.id}
                                draggable
                                onDragStart={() => setDragId(link.id)}
                                className="glow-border p-4 rounded bg-[#080808] cursor-grab active:cursor-grabbing group"
                            >
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-[8px] text-gray-500 uppercase tracking-tighter">Link Node</span>
                                    <button onClick={() => deleteItem(link.id, 'link')} className="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-white text-[10px]">×</button>
                                </div>
                                <h3 
                                    onClick={() => window.open(link.url, '_blank')}
                                    className="text-xs font-bold truncate cursor-pointer hover:underline"
                                >
                                    {link.name}
                                </h3>
                            </div>
                        ))}
                    </div>

                    {/* Simplified Config Modal */}
                    {modal.open && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg">
                            <div className="glow-border w-full max-w-sm p-8 bg-black rounded shadow-2xl">
                                <h2 className="text-xs font-bold uppercase tracking-[0.3em] mb-6 border-b border-white/10 pb-2">
                                    Config <span className="text-gray-400">{modal.type}</span>
                                </h2>
                                <div className="space-y-4">
                                    <input 
                                        autoFocus
                                        placeholder="Display Name"
                                        className="w-full p-3 text-xs rounded outline-none"
                                        value={form.name}
                                        onChange={e => setForm({...form, name: e.target.value})}
                                    />
                                    {modal.type === 'link' && (
                                        <input 
                                            placeholder="URL (e.g. google.com)"
                                            className="w-full p-3 text-xs rounded outline-none"
                                            value={form.url}
                                            onChange={e => setForm({...form, url: e.target.value})}
                                        />
                                    )}
                                    <div className="flex gap-3 pt-4">
                                        <button onClick={closeModal} className="flex-1 py-2 text-[10px] uppercase border border-white/10 hover:bg-white/5">Cancel</button>
                                        <button onClick={addItem} className="flex-1 py-2 text-[10px] uppercase bg-white text-black font-bold">Confirm</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
